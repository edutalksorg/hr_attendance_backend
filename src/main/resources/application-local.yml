spring:
  datasource:
    url: jdbc:h2:mem:megamart;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 9090

logging:
  level:
    org.hibernate.SQL: DEBUG
